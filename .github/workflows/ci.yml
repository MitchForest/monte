name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.1.0
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint / typecheck / test
        run: bun run ci
